name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Placeholder values — API routes are not executed at build time,
          # but some SDK constructors validate key presence on instantiation.
          ANTHROPIC_API_KEY: placeholder
          OPENAI_API_KEY: placeholder
          DEEPSEEK_API_KEY: placeholder
          GEMINI_API_KEY: placeholder
